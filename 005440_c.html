        html,body {margin:0;padding:0;overflow:hidden !important}

        .module-container {margin:20px 0;background-color:var(--bg-white);border:1px solid #ddd;border-radius:var(--radius-large);box-shadow:var(--shadow-normal);font-family:var(--font-family);font-size:var(--font-small);overflow:hidden}
        
        .module-header {background:var(--gradient-blue);color:var(--bg-white);padding:var(--padding-standard);text-align:center}

        .data-table {width:100%;border-collapse:collapse;font-size:var(--font-large);box-shadow:var(--shadow-normal);background-color:var(--bg-white);border-radius:var(--radius-normal);overflow:hidden}
        
        .data-table th {background-color:var(--color-blue);color:var(--bg-white);padding:12px;text-align:center;border:1px solid var(--color-blue-dark);font-weight:bold;font-size:var(--font-large)}
