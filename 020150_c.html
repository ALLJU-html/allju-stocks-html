        html,body {margin:0;padding:0;overflow:hidden !important}

        .module-container {margin:20px 0;background-color:var(--bg-white);border:1px solid #ddd;border-radius:var(--radius-large);box-shadow:var(--shadow-normal);font-family:var(--font-family);font-size:var(--font-small);overflow:hidden}
        
        .module-header {background:var(--gradient-blue);color:var(--bg-white);padding:var(--padding-standard);text-align:center}
        
        .module-title {font-size:var(--font-title);font-weight:bold;margin:0 0 8px 0;color:var(--bg-white)}
        
        .module-subtitle {font-size:var(--font-large);font-weight:500;margin:0;color:rgba(255,255,255,0.9)}
        
        .content-wrapper {padding:var(--padding-standard)}

        .table-section,.info-section {padding:15px 4px;background-color:var(--bg-light);border:1px solid #E0E7FF;border-radius:var(--radius-normal);overflow:visible}

        .flex-center {display:flex;justify-content:center;align-items:center}
        
        .flex-center-wrap {display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:15px}

        .data-table {width:100%;border-collapse:collapse;font-size:var(--font-large);box-shadow:var(--shadow-normal);background-color:var(--bg-white);border-radius:var(--radius-normal);overflow:hidden}
        
        .data-table th {background-color:var(--color-blue);color:var(--bg-white);padding:12px;text-align:center;border:1px solid var(--color-blue-dark);font-weight:bold;font-size:var(--font-large)}

        .data-table tbody tr:hover {background-color:#F5F8FF;transition:background-color 0.2s ease}

        .action-button {padding:12px 20px;text-align:center;text-decoration:none;color:var(--bg-white);border-radius:var(--radius-normal);font-weight:bold;border:none;transition:var(--transition);font-size:var(--font-small);min-width:140px;box-shadow:var(--shadow-normal);cursor:pointer}
        
        .action-button:hover {transform:translateY(-2px);box-shadow:var(--shadow-hover)}

        .error-message {color:var(--color-red);text-align:center;padding:15px 4px;background-color:#ffebee;border-radius:var(--radius-normal);margin:8px 0;border:1px solid #ffcdd2;font-size:var(--font-small)}

            100% {transform:rotate(360deg)}}
        
        @keyframes fadeIn {from {opacity:0;transform:translateY(10px)}
